<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>经济学人格测试｜ECTI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 24px 16px;
            color: #1e293b;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0 0 0.25rem 0;
            letter-spacing: -0.3px;
        }
        .sub {
            color: #475569;
            border-left: 3px solid #3b82f6;
            padding-left: 12px;
            margin: 8px 0 24px 0;
            font-size: 0.9rem;
        }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 20px 24px;
            margin-bottom: 20px;
            transition: all 0.2s;
        }
        .question-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 16px;
            background: #f8fafc;
            padding: 8px 12px;
            border-radius: 20px;
            color: #0f172a;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-left: 8px;
        }
        .option {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 8px 12px;
            border-radius: 16px;
            background: #ffffff;
            transition: background 0.1s;
            border: 1px solid #e2e8f0;
        }
        .option:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        input[type="radio"] {
            margin-top: 3px;
            accent-color: #3b82f6;
            flex-shrink: 0;
        }
        .option-text {
            font-size: 0.9rem;
            line-height: 1.4;
            color: #1e293b;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            margin-top: 12px;
        }
        button:hover {
            background: #2563eb;
            transform: scale(0.98);
        }
        .result-card {
            margin-top: 24px;
            background: linear-gradient(135deg, #f0f9ff 0%, #ffffff 100%);
            border-left: 6px solid #3b82f6;
        }
        .economist-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0 0 4px 0;
            color: #0f172a;
        }
        .tagline {
            font-style: italic;
            color: #334155;
            border-bottom: 1px dashed #cbd5e1;
            padding-bottom: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }
        .discussion {
            background: #f1f5f9;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin: 16px 0;
            color: #0c4a6e;
            line-height: 1.5;
            border-left: 3px solid #3b82f6;
        }
        .radar-container {
            max-width: 350px;
            margin: 20px auto;
        }
        .scores-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
            justify-content: space-between;
        }
        .score-item {
            flex: 1;
            min-width: 90px;
            background: #eef2ff;
            border-radius: 40px;
            padding: 6px 8px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .score-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1e40af;
        }
        hr {
            margin: 20px 0;
            border: none;
            border-top: 2px dotted #cbd5e1;
        }
        .footer {
            text-align: center;
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 30px;
        }
        @media (max-width: 640px) {
            .card {
                padding: 16px;
            }
            .economist-name {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 经济学人格测试</h1>
    <div class="sub">ECTI · 基于五维框架：市场/计划 · 个体/结构 · 均衡/颠覆 · 理性/动物 · 形式/叙述</div>
    <div id="questions-container"></div>
    <button id="submitBtn">✨ 揭示你的经济学人格 ✨</button>
    <div id="resultArea" style="display: none;"></div>
    <div class="footer">30道生活化场景 · 匹配20位思想家</div>
</div>

<script>

    // ------------- 20位经济学家原型 (五维理想百分比 + 个性化讨论) -------------
    const prototypes = [
        { name: "亚当·斯密", market:85, individual:80, equilibrium:80, rationality:85, formal:40, 
          quote:"看不见的手", 
          discussion:"你看什么事情都先问「这个交易是不是自愿的」。别人看到涨价就骂奸商，你看到的是供需信号。你不是冷漠，你只是相信自发秩序——但小心，看不见的手有时候也会颤抖。你那句「看不见的手」被后人念了两百年，但你大概没想到，有些人会拿它当借口拒绝任何监管。" },
        { name: "大卫·李嘉图", market:70, individual:65, equilibrium:75, rationality:90, formal:70, 
          quote:"比较优势是贸易的基石",

        { name: "马尔萨斯", market:50, individual:40, equilibrium:85, rationality:80, formal:55, 
          quote:"人口增长超越食物供应", 
          discussion:"你看到食堂涨价第一个想到「人太多了」。别人看到机会，你看到天花板。你有种悲观的均衡直觉——但历史证明技术进步常常打你的脸。当然，你也可能只是比别人早看到了五十年。" },
        { name: "约翰·穆勒", market:65, individual:70, equilibrium:60, rationality:75, formal:50, 
          quote:"最大幸福原则", 
          discussion:"你是个温和的改良派，既不相信市场万能，也不相信革命。你觉得可以一边算效用，一边谈自由。你的朋友圈会转发「如何在资本主义框架内减少不平等」——但有时候折中意味着两头不讨好。" },
        { name: "卡尔·马克思", market:10, individual:10, equilibrium:5, rationality:20, formal:50, 
          quote:"推翻一切，重来", 
          discussion:"你看什么事情都先问一个问题：「谁获益了？」别人看到外卖便宜了，你看到骑手在雨里跑。别人看到经济增长了，你看到增长的部分进了谁的口袋。你不是悲观，你是清醒——至少你自己这么觉得。你对现有秩序有一种结构性的不满，不是针对某个人，而是觉得这个游戏规则本身就不公平。你能忍受个体的失败，但不能接受系统性的不公。你在朋友圈里是那个转发深度报道、在评论区写长文的人。有人觉得你太激进，但也有人偷偷截图了你说的话。但你要小心的是：当你觉得一切问题都是结构性的时候，你可能会低估个体的能动性——包括你自己的。" },
        { text: "阿尔弗雷德·马歇尔", market:75, individual:70, equilibrium:90, rationality:85, formal:85, 
          quote:"经济学是日常生活的研究", 
          discussion:"你喜欢均衡，喜欢图形，喜欢「其他条件不变」。你觉得剪子有两个刀片，供求各一边。你的书桌干净整洁，笔记用不同颜色标注。但真实世界从来不会等你「假设其他条件不变」。" },
        { name: "莱昂·瓦尔拉斯", market:70, individual:60, equilibrium:95, rationality:90, formal:95, 
          quote:"一般均衡的数学宫殿", 
          discussion:"你痴迷于数学之美，相信所有市场同时出清。你大概是唯一一个会在食堂打饭时思考「是否存在一组价格使得所有窗口排队长度相等」的人。但别忘了，你的拍卖师在现实里不存在。" },
        { name: "门格尔／庞巴维克", market:90, individual:85, equilibrium:65, rationality:85, formal:30, 
          quote:"主观价值，边际革命", 
          discussion:"你觉得价值是主观的，一瓶水对沙漠里的人和对湖边的人完全不同。你讨厌大模型，讨厌总量分析，觉得每个人都是独特的计算单元。你的缺点是：有时候太过相信个人的计算能力，忘了人会犯蠢。" },
        { name: "托斯丹·凡勃伦", market:45, individual:25, equilibrium:40, rationality:60, formal:15, 
          quote:"炫耀性消费，有闲阶级", 
          discussion:"你看穿了一切消费背后的社会表演。别人买iPhone是为了拍照，你觉得是为了发朋友圈让别人知道「我买得起」。你的眼光毒辣，但有时候——一个包就是好看而已，不一定是剥削的符号。" },
        { name: "约翰·梅纳德·凯恩斯", market:40, individual:30, equilibrium:20, rationality:40, formal:65, 
          quote:"长期我们都死了", 
          discussion:"你觉得市场有时候会发疯，需要有人按一下暂停键。你承认人不完全理性——包括你自己。你会因为今天的心情决定买不买一杯奶茶。你相信政策能熨平周期，但小心：上瘾了怎么办？" },
        { name: "弗里德里希·哈耶克", market:95, individual:90, equilibrium:70, rationality:95, formal:10, 
          quote:"自发秩序，知识分散", 
          discussion:"你极度警惕任何「计划」二字。别人说「我们应该规划一下」，你立刻想到集中营。你觉得知识是分散的，没有人能掌握全部信息——包括你自己。你相信演化，讨厌建构。但小心：有时候一个红绿灯确实比所有人互相观察更有效率。" },
        { name: "米尔顿·弗里德曼", market:80, individual:75, equilibrium:75, rationality:90, formal:90, 
          quote:"通胀永远是货币现象", 
          discussion:"你相信规则，相信实证，相信「天下没有免费的午餐」。你觉得政府应该只当裁判员，而不是运动员。你的语言简洁有力，但有时候世界不是回归方程就能说清楚的。" },
        { name: "约瑟夫·熊彼特", market:60, individual:50, equilibrium:30, rationality:70, formal:50, 
          quote:"创造性破坏", 
          discussion:"你喜欢颠覆，喜欢创新，觉得旧的不去新的不来。别人看到工厂倒闭你看到企业家冒出来。但你是那个在毕业旅行中坚持去冷门地的人——即使大家都不去。别忘了，被破坏的人也是人。" },
        { name: "加尔布雷思", market:30, individual:20, equilibrium:40, rationality:50, formal:20, 
          quote:"丰裕社会与权力结构", 
          discussion:"你怀疑大公司操纵你的欲望，让你买了不需要的东西。你觉得广告是新型的极权。你的批判深刻，但有时候——你喜欢那个包，可能真的只是因为它是粉色的。" },
        { name: "罗纳德·科斯", market:85, individual:70, equilibrium:80, rationality:95, formal:45, 
          quote:"交易成本与产权", 
          discussion:"你觉得只要产权清晰、交易成本够低，大家自己就能谈妥。你相信谈判的力量。但现实里，宿舍空调温度的问题，你们谈了一周还没结果——因为有人就是不想谈。" },
        { name: "詹姆斯·布坎南", market:80, individual:85, equilibrium:70, rationality:90, formal:60, 
          quote:"政治市场，公共选择", 
          discussion:"你把政治家也当作理性人，觉得他们也在算自己的利益。你不信任任何「大公无私」的说法。你的怀疑精神可贵，但过度的话，连志愿者你都觉得是作秀。" },
        { name: "埃莉诺·奥斯特罗姆", market:55, individual:60, equilibrium:65, rationality:75, formal:40, 
          quote:"自主治理，多中心", 
          discussion:"你不相信只有市场和政府两条路。你觉得一帮人能自己管好自己的公共池塘。你会组织宿舍共同制定卫生值日表。但你的方案需要信任，而信任在这个时代是奢侈品。" },
        { name: "托马斯·皮凯蒂", market:25, individual:15, equilibrium:45, rationality:55, formal:85, 
          quote:"资本回报率大于经济增长率", 
          discussion:"你带着数据砸向所有人：不平等不是偶然，是结构性的。你相信再分配，相信累进税。你的图表和Excel表格堆满了屏幕，但小心：数字背后的人，不一定按照你的模型行动。" },
        { name: "理查德·塞勒", market:60, individual:50, equilibrium:55, rationality:30, formal:70, 
          quote:"助推，有限理性", 
          discussion:"你承认自己会犯傻，也会原谅别人犯傻。你设计「默认选项」来温柔地推人一把。但别太自信——你以为的「助推」，在别人看来可能是操纵。" },
        { name: "达龙·阿西莫格鲁", market:50, individual:35, equilibrium:60, rationality:70, formal:80, 
          quote:"制度决定国家命运", 
          discussion:"你觉得关键不是文化、不是地理，是制度。包容性制度带来繁荣，汲取性制度带来贫困。你的分析框架清晰有力，但小心——制度也是人创造的，不要把它变成新的决定论。" }
    ];

    // 修正马克思条目（上面漏了name和text混用）
    prototypes[4] = { name: "卡尔·马克思", market:10, individual:10, equilibrium:5, rationality:20, formal:50, 
          quote:"推翻一切，重来", 
          discussion:"你看什么事情都先问一个问题：「谁获益了？」别人看到外卖便宜了，你看到骑手在雨里跑。别人看到经济增长了，你看到增长的部分进了谁的口袋。你不是悲观，你是清醒——至少你自己这么觉得。你对现有秩序有一种结构性的不满，不是针对某个人，而是觉得这个游戏规则本身就不公平。你能忍受个体的失败，但不能接受系统性的不公。你在朋友圈里是那个转发深度报道、在评论区写长文的人。有人觉得你太激进，但也有人偷偷截图了你说的话。但你要小心的是：当你觉得一切问题都是结构性的时候，你可能会低估个体的能动性——包括你自己的。" };
    
    // 修正马歇尔条目
    prototypes[5] = { name: "阿尔弗雷德·马歇尔", market:75, individual:70, equilibrium:90, rationality:85, formal:85, 
          quote:"经济学是日常生活的研究", 
          discussion:"你喜欢均衡，喜欢图形，喜欢「其他条件不变」。你觉得剪子有两个刀片，供求各一边。你的书桌干净整洁，笔记用不同颜色标注。但真实世界从来不会等你「假设其他条件不变」。" };

    function renderQuestions() {
        const container = document.getElementById('questions-container');
        container.innerHTML = '';
        questionsData.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'card';
            const title = document.createElement('div');
            title.className = 'question-title';
            title.innerText = `${idx+1}. ${q.text}`;
            card.appendChild(title);
            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';
            q.options.forEach((opt, optIdx) => {
                const label = document.createElement('label');
                label.className = 'option';
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `q${idx}`;
                radio.value = optIdx;
                radio.setAttribute('data-m', opt.scores.M);
                radio.setAttribute('data-i', opt.scores.I);
                radio.setAttribute('data-e', opt.scores.E);
                radio.setAttribute('data-r', opt.scores.R);
                radio.setAttribute('data-f', opt.scores.F);
                const span = document.createElement('span');
                span.className = 'option-text';
                span.innerText = opt.text;
                label.appendChild(radio);
                label.appendChild(span);
                optionsDiv.appendChild(label);
            });
            card.appendChild(optionsDiv);
            container.appendChild(card);
        });
    }

    function computeScores() {
        let totalM = 0, totalI = 0, totalE = 0, totalR = 0, totalF = 0;
        for (let i = 0; i < questionsData.length; i++) {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (!selected) return null;
            totalM += parseInt(selected.getAttribute('data-m')) || 0;
            totalI += parseInt(selected.getAttribute('data-i')) || 0;
            totalE += parseInt(selected.getAttribute('data-e')) || 0;
            totalR += parseInt(selected.getAttribute('data-r')) || 0;
            totalF += parseInt(selected.getAttribute('data-f')) || 0;
        }
        const toPercent = (score) => Math.round(((score + 60) / 120) * 100);
        return {
            market: toPercent(totalM),
            individual: toPercent(totalI),
            equilibrium: toPercent(totalE),
            rationality: toPercent(totalR),
            formal: toPercent(totalF)
        };
    }

    function matchPrototype(scores) {
        let best = null;
        let minDist = Infinity;
        for (let p of prototypes) {
            const dist = Math.sqrt(
                Math.pow(scores.market - p.market, 2) +
                Math.pow(scores.individual - p.individual, 2) +
                Math.pow(scores.equilibrium - p.equilibrium, 2) +
                Math.pow(scores.rationality - p.rationality, 2) +
                Math.pow(scores.formal - p.formal, 2)
            );
            if (dist < minDist) {
                minDist = dist;
                best = p;
            }
        }
        return best;
    }

    let radarChart = null;
    function displayResult(scores, matched) {
        const resultDiv = document.getElementById('resultArea');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
            <div class="card result-card">
                <div class="economist-name">📌 ${matched.name}</div>
                <div class="tagline">“${matched.quote}”</div>
                <div class="discussion">${matched.discussion}</div>
                <hr>
                <div class="scores-grid">
                    <div class="score-item">📈 市场 ${scores.market}%<br><span style="font-size:0.7rem;">计划 ${100-scores.market}%</span></div>
                    <div class="score-item">🧑 个体 ${scores.individual}%<br><span style="font-size:0.7rem;">结构 ${100-scores.individual}%</span></div>
                    <div class="score-item">⚖️ 均衡 ${scores.equilibrium}%<br><span style="font-size:0.7rem;">颠覆 ${100-scores.equilibrium}%</span></div>
                    <div class="score-item">🧠 理性 ${scores.rationality}%<br><span style="font-size:0.7rem;">动物 ${100-scores.rationality}%</span></div>
                    <div class="score-item">📐 形式 ${scores.formal}%<br><span style="font-size:0.7rem;">叙述 ${100-scores.formal}%</span></div>
                </div>
                <div class="radar-container">
                    <canvas id="radarCanvas" width="400" height="400"></canvas>
                </div>
                <p style="font-size:0.8rem; text-align:center; color:#475569;">✨ 你的思想谱系与 ${matched.name} 最为接近 ✨</p>
            </div>
        `;
        const ctx = document.getElementById('radarCanvas').getContext('2d');
        if (radarChart) radarChart.destroy();
        radarChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['市场倾向', '个体倾向', '均衡倾向', '理性倾向', '形式倾向'],
                datasets: [
                    { label: '你的倾向', data: [scores.market, scores.individual, scores.equilibrium, scores.rationality, scores.formal], backgroundColor: 'rgba(59,130,246,0.2)', borderColor: '#3b82f6', borderWidth: 2, pointBackgroundColor: '#3b82f6', pointRadius: 5 },
                    { label: matched.name, data: [matched.market, matched.individual, matched.equilibrium, matched.rationality, matched.formal], backgroundColor: 'rgba(249,115,22,0.1)', borderColor: '#f97316', borderWidth: 2, pointBackgroundColor: '#f97316', pointRadius: 4, borderDash: [5,5] }
                ]
            },
            options: { responsive: true, maintainAspectRatio: true, scales: { r: { beginAtZero: true, max: 100, ticks: { stepSize: 20 } } } }
        });
    }

    document.getElementById('submitBtn').addEventListener('click', () => {
        const scores = computeScores();
        if (!scores) { alert('请回答完所有30道题目再提交～'); return; }
        const matched = matchPrototype(scores);
        displayResult(scores, matched);
        window.scrollTo({ top: document.getElementById('resultArea').offsetTop - 20, behavior: 'smooth' });
    });

    renderQuestions();
</script>
