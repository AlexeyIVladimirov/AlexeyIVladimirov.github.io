    const prototypes = [
        { name: "亚当·斯密", market:85, individual:80, equilibrium:80, rationality:85, formal:40, quote:"看不见的手",
          discussion: `<p>你看什么事情都先问：“这个交易是不是自愿的？”别人看到涨价就骂奸商，你看到的是供需信号在闪烁。别人说“政府应该管管”，你第一反应是“管了之后呢？谁去管那个管的人？”你不是冷血，你只是相信：千百万人各自谋生，比一个英明的计划更靠谱。</p>
<p>你在食堂打饭时会观察哪个窗口排队更自然——不是因为有管理员在指挥，而是因为大家都觉得那个窗口的菜值那个时间。你在小组作业里会主动提议按贡献打分，因为你觉得公平不是平均，而是每个人拿到他应得的那一份。你的朋友圈里很少转发“震惊体”，但会分享一篇关于交易成本的文章，配文只有四个字：“科斯说得对”。</p>
<p>你有一种古典的乐观：只要每个人追求自己的利益，整个社会就会像被一只看不见的手引导，走向繁荣。你不相信英雄造时势，你相信时势造英雄——而且英雄也不知道自己在造时势。你能容忍个体的失败，因为你觉得那是学习的代价；你不太能容忍的是有人用“集体利益”的名义剥夺个体的选择。</p>
<p>但你要小心的是：看不见的手有时候也会颤抖。当交易成本高到离谱、当信息不对称严重到买家根本不知道自己在买什么、当外部性大到污染了整条河——那只手可能就不太灵了。你可能会低估市场失灵的真实频率，因为你的思维习惯是把“理想市场”当作基准，然后把现实中的摩擦当作“临时异常”。问题是，有些异常从不临时。</p>
<p>另一个你需要警惕的是：你推崇自发秩序，但自发秩序并不总是美好的。黑帮也有自发秩序，腐败也有均衡状态。市场原教旨主义不是你的错，但如果你把所有问题都归结为“政府干预太多”，那你就和那些把所有问题都归结为“资本家太坏”的人一样——都在用一个单一原因解释复杂世界。真正的斯密不是自由放任的极端分子，他写过《道德情操论》，他知道同情心也很重要。</p>` },
        { name: "大卫·李嘉图", market:70, individual:65, equilibrium:75, rationality:90, formal:70, quote:"比较优势是贸易的基石",
          discussion: `<p>你脑子里总在算“谁的机会成本更低”。别人纠结谁对谁错，你直接画一张表格。你相信分工能让所有人获益，只要每个人都做自己最擅长的事。在食堂窗口的选择上，你会分析哪个窗口的排队时间-味道比最优；在小组作业里，你会主动承担自己最擅长的部分，然后把剩下的分出去。</p>
<p>你有一种冷峻的效率观：总收益最大化了，分配问题可以再谈。你读李嘉图的《政治经济学及赋税原理》时，最兴奋的是那个数字例子——英国和葡萄牙交换葡萄酒和呢绒，双方都赚了。你在生活中也喜欢交换：你帮室友修电脑，他帮你带饭；你用知识换人脉，用时间换资源。</p>
<p>但你的盲点也很明显：你假设资本和劳动可以自由流动，但现实中工人不能随便换国家，资本却可以。比较优势理论在静态世界里很美，但动态中，一个国家可能永远被锁在低端分工里。你可能会说“那是政治问题，不是经济学问题”——但政治和经济分不开。</p>
<p>另一个你需要反思的是：你太相信效率，不太在意谁拿到了好处。如果总蛋糕变大了，但切蛋糕的方式让穷人更穷，你还觉得这是进步吗？李嘉图本人其实很关心分配，他提出了“地主-资本-工人”三分法。但后来的新古典经济学家把他包装成了纯粹的增长派。不要丢了他对分配问题的敏感。</p>
<p>最后，小心你的“理性计算”变成一种冷漠。你可能会对那个划水的同学说“你的比较优势就是划水，那你继续划吧”——这虽然是逻辑上的玩笑，但现实中，人不是函数。</p>` },
        { name: "卡尔·马克思", market:10, individual:10, equilibrium:5, rationality:20, formal:50, quote:"推翻一切，重来",
          discussion: `<p>你看什么事情都先问一个问题：“谁获益了？”别人看到外卖便宜了，你看到骑手在雨里跑。别人看到经济增长了，你看到增长的部分进了谁的口袋。你不是悲观，你是清醒——至少你自己这么觉得。你对现有秩序有一种结构性的不满，不是针对某个人，而是觉得这个游戏规则本身就不公平。</p>
<p>你能忍受个体的失败，但不能接受系统性的不公。在食堂里，别人抱怨今天的菜咸了，你想到的是食堂承包商和学校之间的利益输送。在小组作业里，别人生气那个划水的同学，你觉得是这个评分制度本身就鼓励搭便车。你在朋友圈里是那个转发深度报道、在评论区写长文的人。有人觉得你太激进，但也有人偷偷截图了你说的话。</p>
<p>你相信矛盾会积累，危机不可避免，旧秩序终将被新秩序取代。你有一种革命浪漫主义：不破不立，大破大立。你不怕冲突，甚至觉得冲突是清洗污垢的暴雨。你的英雄不是白手起家的企业家，而是那些站出来说“这不对”的人——罢工的工人、揭露黑幕的记者、在操场上抗议食堂涨价的同学。</p>
<p>但你要小心的是：当你觉得一切问题都是结构性的时候，你可能会低估个体的能动性——包括你自己的。不是每一次涨价都是阴谋，不是每一个富人都靠剥削，不是每一次改革失败都因为敌人太强大。有时候，食堂涨价真的只是因为猪肉贵了。另外，革命之后怎么办？你可能会说“那是后人的事”，但后人就是你。</p>
<p>另一个你需要反思的是：你太擅长解构，但建构需要不同的能力。推翻一个旧世界只需要愤怒，建设一个新世界需要耐心、妥协、琐碎的谈判和无数个不浪漫的下午。如果你把所有注意力都放在批判上，你可能永远停在“准备革命”的阶段，而生活已经在别处继续了。试着在批判的同时，也动手做一件具体的小事——哪怕只是帮室友倒一次垃圾。</p>` },
        { name: "阿尔弗雷德·马歇尔", market:75, individual:70, equilibrium:90, rationality:85, formal:85, quote:"均衡的力量",
          discussion: `<p>你喜欢均衡，喜欢图形，喜欢“其他条件不变”。你觉得剪子有两个刀片，供求各一边。你的书桌干净整洁，笔记用不同颜色标注。你在食堂选窗口时会想：如果大家都理性选择，那么两个窗口的排队长度会自然趋于相等——这就是均衡。</p>
<p>你对“稳定”有一种审美偏好。你不喜欢大起大落，不喜欢革命，不喜欢“创造性破坏”那种暴力美学。你觉得渐进改良才是正道。在小组作业里，你希望每个人按边际贡献分配；在拼车时，你坚持按里程算钱。你相信，只要把每个小问题都用市场逻辑校准，大问题就不会发生。</p>
<p>马歇尔给了你一套工具箱：弹性、剩余、均衡、时间周期。你用得顺手，甚至有点依赖。但别忘了，马歇尔本人非常关注现实细节，他花了很多年写《经济学原理》，就是为了让经济学不那么抽象。你可能会在数学的舒适区里待得太久，忘了出门看看真实的人是怎么犯错的。</p>
<p>你的盲点是：均衡是结果，不是起点。现实中，价格调整有摩擦，信息不完美，习惯有惯性。你假设的“其他条件不变”几乎永远在变。你可能会把暂时的偏差当作“扰动”，但有些偏差就是新的常态。</p>
<p>最后，小心你的工具崇拜。图形和公式很美，但它们是对现实的简化。简化到一定程度，就会失真。马歇尔也说过：“经济学家的圣地是经济事实。”别让工具变成目的。</p>` },
        { name: "约翰·梅纳德·凯恩斯", market:40, individual:30, equilibrium:20, rationality:40, formal:65, quote:"长期我们都死了",
          discussion: `<p>你是个现实主义者，但有趣的是，你的现实主义里带着一种任性。你知道市场有时候会发疯，你知道人不完全理性——包括你自己。今天你可能因为心情好买了一堆不需要的东西，明天又因为被老师骂了决定“消费降级”。你不觉得这有什么不对，因为你觉得这就是人性。</p>
<p>你对“均衡”没什么耐心。别人说“市场会自我纠正”，你说“纠正之前我已经饿死了”。在食堂涨价的问题上，你不会等“长期”的供需调整，你会直接建议学校发餐补。在实习offer的选择上，你不会只算未来的NPV，你会考虑“我现在需要多少钱才能不焦虑”。你相信政策能熨平周期，政府应该在别人恐慌时贪婪，在别人贪婪时恐慌——当然，这里的“政府”最好是你信任的那批人。</p>
<p>你的思维方式是短期的、灵活的、反教条的。你觉得“长期”这个概念是那些不想负责的人用来搪塞的。你可能会在毕业旅行中提议“去哪都行，先走再说”，然后到了地方再随机应变。你不喜欢宏大叙事，但你也不喜欢枯燥的微观优化。你处在一个中间地带：承认问题，但不想用革命解决；承认市场，但不想让它裸奔。</p>
<p>但你要小心的是：你的灵活性有时候会滑向机会主义。如果每一次危机你都主张“政府出手”，那政府的手可能永远缩不回来。凯恩斯自己说过，长期我们都死了——但我们的孩子还活着。过度依赖短期刺激可能会留下债务和通胀的后遗症。另外，你的“动物精神”可能让你在某些时候过于冲动：买了一只根本不了解的股票，选了一个根本不合适的专业，只是因为“感觉对了”。</p>
<p>最后，你可能会低估习惯和制度的力量。凯恩斯在《通论》最后一章写道：“经济学家和政治哲学家的思想，无论对错，都比通常认为的更有力量。”你同意这句话吗？如果你的答案是“同意”，那么请记住：你自己也在塑造别人的思想。你此刻的每一个选择，都在为未来的“长期”铺路——哪怕你不喜欢“长期”这个词。</p>` },
        { name: "弗里德里希·哈耶克", market:95, individual:90, equilibrium:70, rationality:95, formal:10, quote:"自发秩序，知识分散",
          discussion: `<p>你极度警惕任何“计划”二字。别人说“我们应该规划一下”，你立刻想到集中营。别人说“政府应该管管房价”，你想到的是价格信号被扭曲、资源错配、黑市横行。你不是反社会，你只是深刻地相信：没有人知道所有事情，任何集中决策都会丢失大量分散在个体手中的信息。</p>
<p>你的思维习惯是：先问“谁掌握信息”。在食堂免费汤的问题上，你不会提议“每人限打一碗”，因为你觉得那需要管理员，而管理员不知道谁今天特别饿。你会倾向于“收费”或者“先到先得”——让个体自己判断。在小组作业里，你反对老师统一打分，因为你相信只有组内成员才知道谁干了多少。你愿意接受不公平的结果，只要那个结果是自发产生的，而不是被某个权威分配的。</p>
<p>你有一种演化论的世界观：好东西不是设计出来的，是长出来的。语言、货币、法律、道德——没有一个是某个人坐在办公室里发明的。你欣赏那种“不知道为什么会成功但就是成功了”的现象，因为你觉得那说明它经过了无数人的试错。你在朋友圈里转发的是那些讲“试错”“演化”“反脆弱”的文章，配文往往是“不要瞎折腾”。</p>
<p>但你要小心的是：自发秩序并不总是通往天堂。市场也会产生垄断，演化也会陷入局部最优，自发的不一定是好的——黑帮秩序也是自发形成的。你不能把所有问题都归咎于“政府干预太多”，因为有些地方政府根本就没怎么干预，问题依然存在。另外，你的“知识分散”论点反过来也成立：你不知道政府不知道什么，但你也不知道市场失灵的时候市场自己也不知道该怎么办。</p>
<p>还有一个你需要反思的：你太相信个体的理性和信息处理能力了。现实中，人会跟风、会恐慌、会上当。你可能会说“那是他们自己的选择，后果自负”——但在一个高度互联的社会里，别人的错误决策会影响你的生活。金融危机里，那些乱买次级贷的人“活该”，但他们破产了，你的工作也没了。纯粹的“后果自负”在一个非独立的世界里是行不通的。</p>` },
        { name: "米尔顿·弗里德曼", market:80, individual:75, equilibrium:75, rationality:90, formal:90, quote:"通胀永远是货币现象",
          discussion: `<p>你是一个简洁的人。你的世界里有清晰的因果关系：太多货币追逐太少商品，就是通胀；最低工资法会提高失业率；租金管制会导致住房短缺。你不喜欢模糊，不喜欢“结构性问题”这种大词，你觉得那是为无能找借口。你的书桌上可能只有三本书：弗里德曼的《资本主义与自由》、一本统计教材、一本你其实没怎么看但觉得应该放那儿的经典文学。</p>
<p>你在生活中也追求简洁：拼车按里程算钱，小组作业按贡献打分，奖学金纯看成绩。你不觉得这“冷血”，你觉得这公平——公平不是给每个人一样的东西，而是给每个人他应得的东西，而“应得”由市场说了算。你对“计划经济”有天生的反感，因为你觉得那意味着有人在替你决定什么对你最好。你宁愿自己犯错，也不愿让别人替你选择。</p>
<p>你相信规则，而不是相机抉择。你觉得货币政策应该遵循固定增长率，而不是让央行官员拍脑袋。你觉得法律应该清晰明确，而不是给法官太多自由裁量权。你在小组里讨厌那种“看情况再说”的人，你会提前制定好分工表、时间表、评分表，然后严格执行。你不是控制狂，你只是觉得混乱的成本比僵化的成本更高。</p>
<p>但你要小心的是：现实往往比你的模型更复杂。最低工资法真的提高了失业率吗？有些研究发现影响很小，因为企业可以通过其他方式调整。租金管制真的导致住房短缺吗？在有些城市，管制伴随着大量公共住房建设，反而让更多人住得起。你的模型在理想条件下成立，但理想条件很少出现。你可能过于相信自己的回归结果，而忽略了那些无法量化的因素——比如尊严、归属感、对未来的希望。</p>
<p>另一个你需要反思的是：你把“自由”等同于“没有强制”，但自由也需要能力。一个身无分文的人，你告诉他有选择任何工作的自由，这个自由是真实的吗？弗里德曼支持负所得税，他其实承认了这一点：自由需要一定的物质基础。你可能会说“那是慈善的事，不是政府的事”——但政府本来就是人们组织起来共同解决问题的方式，为什么一定要把它排除在外？</p>` },
        { name: "托斯丹·凡勃伦", market:45, individual:25, equilibrium:40, rationality:60, formal:15, quote:"炫耀性消费",
          discussion: `<p>你看穿了一切消费背后的社会表演。别人买iPhone是为了拍照，你觉得是为了发朋友圈让别人知道“我买得起”。别人穿名牌是为了舒适，你觉得是为了显示阶级地位。你的眼光毒辣，甚至有点刻薄。你可能是那个在二手群里说“这破教材凭什么卖这么贵，不就是因为老师指定了嘛”的人。</p>
<p>你是一个制度主义者，但和马克思不同，你不那么关注生产领域，你关注消费领域和闲暇领域。你觉得现代人的很多行为不是为了效用，而是为了“炫耀”和“歧视性对比”。食堂里，有人宁可排长队也不去新窗口，不是因为新窗口难吃，而是因为排长队显得“大家都在选”。你在小组里，有人抢着做presentation，不是因为擅长，而是因为想显得自己重要。</p>
<p>你对“理性人”假设嗤之以鼻。你觉得人大部分时间是被习惯、攀比和虚荣驱动。你不喜欢数学形式主义，因为那些模型抓不住这些“非理性但可解释”的行为。你喜欢讲故事，喜欢案例，喜欢挖苦。你的文章读起来像小说，但比小说更刻薄。</p>
<p>但你要小心的是：你的批判有时候会变成一种犬儒主义。如果一切都是炫耀，那真诚还存在吗？如果一切都是表演，那你自己呢？你写这些批判，不也是想显得自己比别人更清醒吗？这是个悖论。另外，你可能会低估真正的物质需求。不是每个人买iPhone都是为了炫耀——有些人就是需要那个生态。不是你每一次排长队都是为了从众——有时候就是懒。</p>
<p>最后，凡勃伦的解决方案是什么？他其实没有太好的答案。他批判了有闲阶级，但没提出替代方案。你如果只停在批判，就和他一样。试着在解构之后，也建构一点东西——哪怕只是一个“不炫耀”的小圈子。</p>` },
        { name: "托马斯·皮凯蒂", market:25, individual:15, equilibrium:45, rationality:55, formal:85, quote:"资本回报率大于经济增长率",
          discussion: `<p>你是一个带着数据砸向世界的人。别人讲情怀，你甩出Excel。别人讲道德，你甩出时间序列。你相信数字不会撒谎——至少比政客和企业家诚实。你的手机里可能有一个文件夹叫“数据”，里面有几十个CSV文件，虽然你很少真的打开它们，但你知道它们在那里，就像一种信仰。</p>
<p>你看问题的方式是历史性的、结构性的。食堂涨价？你会查过去十年的菜价数据，看涨跌是否和食材成本同步。奖学金分配？你会看不同家庭背景学生的获奖比例，看是否存在系统性偏差。你不满足于“这次是谁的错”，你想知道“为什么一次又一次，结果总是对某些群体不利？”</p>
<p>你的答案是：因为资本回报率(r)长期大于经济增长率(g)。这意味着财富会自动积累到已经拥有财富的人手里，劳动收入永远跑不过资本收入。你觉得这不是个人努力的问题，这是系统设置的问题。你相信再分配——不是施舍，是矫正。你不反对市场，但你觉得市场需要戴上一个紧箍咒：累进税、遗产税、全民基本收入。</p>
<p>但你要小心的是：数据也会撒谎，或者说，数据不会撒谎但解读数据的人会。你可以找到支持任何结论的数据，只要你会挑选时间区间、调整统计口径、决定要不要剔除异常值。你可能会不自觉地选择那些强化你已有信念的数据，而忽视反例。另外，r > g 在历史上确实是常态，但未来呢？如果AI导致资本回报率下降，如果战争或气候危机摧毁了大量财富，这个公式还会成立吗？</p>
<p>另一个你需要反思的是：你太依赖总量指标，而忽视了内部的异质性。虽然整体上r > g，但有些人通过劳动积累了财富，有些人通过继承挥霍了家产。你不能把所有富人都当作食利者，也不能把所有穷人都当作受害者。结构分析是必要的，但如果它让你看不见具体的人，你就从一种抽象走向了另一种抽象。皮凯蒂自己在《资本与意识形态》里也承认，真正的变革需要每个人的参与，而不仅仅是数据测算。</p>` },
        { name: "理查德·塞勒", market:60, individual:50, equilibrium:55, rationality:30, formal:70, quote:"助推",
          discussion: `<p>你是一个承认自己会犯傻的人。你会在超市里买那些“买一送一”但其实并不需要的东西；你会因为“最后三天”的标语而匆忙下单；你会把健身卡当作减肥的替代品——办了就等于练了。你不觉得这有什么可耻的，你觉得这是人性。你奇怪的是，为什么经济学家们总假设人是理性的？他们自己也不理性啊。</p>
<p>你的思维是行为导向的：与其批评人们“不够理性”，不如设计一个更好的“选择架构”。在食堂里，你不会抱怨大家吃太多浪费粮食，你会建议把健康食品放在更容易看到的位置。在小组作业里，你不会骂那个划水的同学，你会建议把分工写在一张纸上让大家签字——不是强制，是“助推”。你相信温柔的引导比强硬的命令更有效，也更尊重人的自主性。</p>
<p>你在朋友圈里转发的是那些关于“心理账户”、“损失厌恶”、“默认选项效应”的文章，配文往往是“原来我不是一个人”。你喜欢实验，喜欢A/B测试，喜欢“试一试再说”。你不是那种“先想清楚再行动”的人，你是“先试试看，不行再改”的人。你觉得这个世界太复杂了，没有人能预先设计完美，但你可以通过小步快跑来逼近最优。</p>
<p>但你要小心的是：“助推”和“操纵”之间的界限非常模糊。当你把健康食品放到显眼位置时，你是在“助推”还是在“控制”？如果这个权力被政府掌握，他们会不会用同样的技术让你买国债、让你支持某个政策、让你对某个群体产生反感？塞勒本人对此很警惕，但他的追随者未必。你可能会过于相信自己的善意，而低估了权力的傲慢。</p>
<p>另一个你需要反思的是：助推解决不了根本性的利益冲突。如果一个企业的商业模式就是让人上瘾（比如游戏、社交媒体），那无论你怎么调整选择架构，它都会找到新的方法捕捉你的注意力。这时候需要的是法律、监管、甚至是拆分，而不是温和的“默认选项”。你的工具箱里不能只有锤子，否则所有问题看起来都像钉子。有些冲突需要正面交锋，而不是侧面引导。</p>` },
        { name: "约瑟夫·熊彼特", market:60, individual:50, equilibrium:30, rationality:70, formal:50, quote:"创造性破坏",
          discussion: `<p>你是一个喜欢混乱的人——至少在经济学意义上。你觉得稳定是死的，动荡才是活的。别人看到工厂倒闭、工人下岗，你看到的是资源被释放出来，流向新的地方。别人看到诺基亚垮了，你看到的是苹果崛起的空间。你不是冷酷，你只是觉得：没有破坏，就没有创造。</p>
<p>你的思维习惯是：先问“这件事有什么新的东西”。食堂开了新窗口？你会去试，哪怕难吃，因为你想知道“新”在哪里。小组作业里有人提出奇怪的想法？你会先听，而不是先否定。你的毕业设计选的是那个“难但有趣”的题目，因为你觉得容易的那个太无聊了。你相信企业家是经济的灵魂——不是管理者，不是资本家，是那个把新组合带到世界上的人。</p>
<p>你能忍受失败，因为你觉得失败是创造的代价。你自己也失败过：创业项目黄了，申请被拒了，喜欢的人不喜欢你。但你不会因此退缩，你会觉得“至少我试了”。你的偶像是那些颠覆者：马斯克、张小龙、那个在食堂里开螺蛳粉窗口的人。你觉得他们的成功不是因为遵守规则，而是因为打破规则。</p>
<p>但你要小心的是：创造性破坏的“破坏”部分，是有人承受的。工人失业不是统计数字，是他们下个月的房租和孩子的学费。你可能会说“那是转型的代价”，但说这句话的时候，你自己不在那个代价里。你需要问自己：如果每次创新都让我身边的一部分人陷入困境，我还能那么轻松地赞美“破坏”吗？</p>
<p>另一个你需要反思的是：不是所有的创新都是好的。有些创新只是重新包装了旧东西，有些创新让世界变得更糟糕（比如更高效地推送垃圾信息）。熊彼特本人晚年对资本主义的未来并不乐观，他觉得大公司会取代企业家，创新会变成常规化的研发部门。今天的硅谷可能就是他担心的那种：表面光鲜，但内核官僚。你赞美创新，但如果你无法区分真创新和伪创新，你就可能变成一个只会喊“颠覆”的空壳。</p>` },
        { name: "达龙·阿西莫格鲁", market:50, individual:35, equilibrium:60, rationality:70, formal:80, quote:"制度决定国家命运",
          discussion: `<p>你是一个制度主义者。你看待任何问题，最后都会落到“制度”两个字上。食堂为什么难吃？因为食堂没有竞争，采购不透明。小组作业为什么有人划水？因为制度不鼓励合作，或者惩罚机制缺失。你觉得个人行为很大程度上是被制度塑造的：换一套规则，人就会换一套行为。</p>
<p>你的思维方式是历史比较的。你不会只看一个学校的问题，你会看不同学校的对比。你不会只看今天的问题，你会看这个制度是怎么演变来的。你可能会问：为什么有的宿舍卫生很好，有的像垃圾场？不是因为前者的人更好，而是因为前者的宿管制度更合理（比如评分、免检、奖励）。你相信好的制度能让坏人变好，坏的制度能让好人变坏。</p>
<p>你在朋友圈里转发的是那些关于“包容性制度vs汲取性制度”的文章，配文往往是“关键在于规则”。你对“文化解释”和“地理决定论”都不太满意，你觉得那些太像借口了——好像一个国家穷是因为它命中注定。你不信命，你信制度可以改变，而改变需要集体行动。你不是革命者，你是改革者：你觉得制度是可以设计的，只是需要勇气和智慧。</p>
<p>但你要小心的是：制度不是写在纸上的条文，它是活人的行为模式。一个看起来完美的制度，如果执行的人不想配合，或者根本没有能力执行，那就是一纸空文。你可能会过度相信“制度设计”的力量，而忽略了执行中的政治博弈、权力斗争、利益集团的阻挠。阿西莫格鲁自己也知道这一点，所以他强调“制度是政治冲突的结果”——但这样一来，问题又回到了：谁有能力改变政治力量对比？</p>
<p>另一个你需要反思的是：你可能会把制度当作万能的解释，而忽略了随机性、领导力、偶然事件的作用。有些事情就是运气好：某个关键人物在关键时刻做了一个正确的决定，然后整个制度就被锁定了。你也可能低估了文化的韧性：有些习惯和信念，换十套制度都改不了。制度重要，但不是全部。如果你把所有问题都归因于制度，你可能在等一个永远不会到来的“制度革命”，而忽略了当下可以做的微小改进。</p>` }
    ];

    // 辅助：渲染题目
    function renderQuestions() {
        const container = document.getElementById('questions-container');
        container.innerHTML = '';
        questionsData.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'card';
            const title = document.createElement('div');
            title.className = 'question-title';
            title.innerText = `${idx+1}. ${q.text}`;
            card.appendChild(title);
            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';
            q.options.forEach((opt, optIdx) => {
                const label = document.createElement('label');
                label.className = 'option';
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `q${idx}`;
                radio.value = optIdx;
                for (let [k,v] of Object.entries(opt.scores)) {
                    radio.setAttribute(`data-${k.toLowerCase()}`, v);
                }
                const span = document.createElement('span');
                span.className = 'option-text';
                span.innerText = opt.text;
                label.appendChild(radio);
                label.appendChild(span);
                optionsDiv.appendChild(label);
            });
            card.appendChild(optionsDiv);
            container.appendChild(card);
        });
    }

    function computeScores() {
        let totalM = 0, totalI = 0, totalE = 0, totalR = 0, totalF = 0;
        for (let i = 0; i < questionsData.length; i++) {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (!selected) return null;
            totalM += parseInt(selected.getAttribute('data-m')) || 0;
            totalI += parseInt(selected.getAttribute('data-i')) || 0;
            totalE += parseInt(selected.getAttribute('data-e')) || 0;
            totalR += parseInt(selected.getAttribute('data-r')) || 0;
            totalF += parseInt(selected.getAttribute('data-f')) || 0;
        }
        const toPercent = (score) => Math.round(((score + 60) / 120) * 100);
        return { market: toPercent(totalM), individual: toPercent(totalI), equilibrium: toPercent(totalE), rationality: toPercent(totalR), formal: toPercent(totalF) };
    }

    function matchPrototype(scores) {
        let best = null, minDist = Infinity;
        for (let p of prototypes) {
            const dist = Math.sqrt(
                Math.pow(scores.market - p.market, 2) +
                Math.pow(scores.individual - p.individual, 2) +
                Math.pow(scores.equilibrium - p.equilibrium, 2) +
                Math.pow(scores.rationality - p.rationality, 2) +
                Math.pow(scores.formal - p.formal, 2)
            );
            if (dist < minDist) { minDist = dist; best = p; }
        }
        return best;
    }

    let radarChart = null;
    function displayResult(scores, matched) {
        const resultDiv = document.getElementById('resultArea');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
            <div class="card result-card">
                <div class="economist-name">📌 ${matched.name}</div>
                <div class="tagline">“${matched.quote}”</div>
                <div class="discussion">${matched.discussion}</div>
                <hr>
                <div class="scores-grid">
                    <div class="score-item">📈 市场 ${scores.market}%<br><span style="font-size:0.7rem;">计划 ${100-scores.market}%</span></div>
                    <div class="score-item">🧑 个体 ${scores.individual}%<br><span style="font-size:0.7rem;">结构 ${100-scores.individual}%</span></div>
                    <div class="score-item">⚖️ 均衡 ${scores.equilibrium}%<br><span style="font-size:0.7rem;">颠覆 ${100-scores.equilibrium}%</span></div>
                    <div class="score-item">🧠 理性 ${scores.rationality}%<br><span style="font-size:0.7rem;">动物 ${100-scores.rationality}%</span></div>
                    <div class="score-item">📐 形式 ${scores.formal}%<br><span style="font-size:0.7rem;">叙述 ${100-scores.formal}%</span></div>
                </div>
                <div class="radar-container"><canvas id="radarCanvas" width="400" height="400"></canvas></div>
                <p style="font-size:0.8rem; text-align:center; color:#475569;">✨ 你的思想谱系与 ${matched.name} 最为接近 ✨</p>
            </div>`;
        const ctx = document.getElementById('radarCanvas').getContext('2d');
        if (radarChart) radarChart.destroy();
        radarChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['市场', '个体', '均衡', '理性', '形式'],
                datasets: [
                    { label: '你的倾向', data: [scores.market, scores.individual, scores.equilibrium, scores.rationality, scores.formal], backgroundColor: 'rgba(59,130,246,0.2)', borderColor: '#3b82f6', borderWidth: 2, pointRadius: 4 },
                    { label: matched.name, data: [matched.market, matched.individual, matched.equilibrium, matched.rationality, matched.formal], backgroundColor: 'rgba(249,115,22,0.1)', borderColor: '#f97316', borderWidth: 2, borderDash: [5,5], pointRadius: 3 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: true, scales: { r: { beginAtZero: true, max: 100, ticks: { stepSize: 20 } } } }
        });
    }

    document.getElementById('submitBtn').addEventListener('click', () => {
        const scores = computeScores();
        if (!scores) { alert('请回答完所有20道题目再提交～'); return; }
        const matched = matchPrototype(scores);
        displayResult(scores, matched);
        window.scrollTo({ top: document.getElementById('resultArea').offsetTop - 20, behavior: 'smooth' });
    });
    renderQuestions();
</script>
</body>
</html>
